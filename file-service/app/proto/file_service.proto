syntax = "proto3";

package fileservice;

service FileService {
  // Process a document: upload → OCR → PageIndex → DB
  rpc ProcessDocument (ProcessDocumentRequest) returns (ProcessDocumentResponse);

  // Check processing status of a document
  rpc GetDocumentStatus (GetDocumentStatusRequest) returns (GetDocumentStatusResponse);

  // Delete a document and its tree/nodes
  rpc DeleteDocument (DeleteDocumentRequest) returns (DeleteDocumentResponse);
}

message ProcessDocumentRequest {
  string file_name = 1;
  bytes file_data = 2;
  string user_id = 3;
}

message ProcessDocumentResponse {
  string doc_id = 1;
  string minio_key = 2;
  string status = 3;
  string message = 4;
}

message GetDocumentStatusRequest {
  string doc_id = 1;
}

message GetDocumentStatusResponse {
  string doc_id = 1;
  string status = 2;
  string file_name = 3;
  int32 node_count = 4;
  string message = 5;
}

message DeleteDocumentRequest {
  string doc_id = 1;
}

message DeleteDocumentResponse {
  bool success = 1;
  string message = 2;
}
