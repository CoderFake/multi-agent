# Local development services (not for production)
# Usage: make db-up / make db-down

services:
  postgres:
    image: postgres:15
    container_name: agent-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: agent
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Milvus Vector Database ─────────────────────────────────────────────
  # Standalone mode with etcd (metadata) + minio (object storage)
  # API exposed on port 19535 for external access
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: agent-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"  # 4GB
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: agent-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9010}:9000"      # S3 API (non-default)
      - "${MINIO_CONSOLE_PORT:-9011}:9001"   # Console UI (non-default)
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.17
    container_name: agent-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19535:19530"  # Milvus gRPC API exposed on 19535
    volumes:
      - milvus_data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── RabbitMQ Task Broker ───────────────────────────────────────────────
  # Internal only - no port export. Used for async task dispatch
  # between backend agent and retrieval microservice.
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: agent-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: agent
      RABBITMQ_DEFAULT_PASS: localdev
    ports:
      - "${RABBITMQ_PORT:-5673}:5672"        # AMQP (non-default)
      - "${RABBITMQ_MGMT_PORT:-15673}:15672" # Management UI (non-default)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Retrieval Microservice ─────────────────────────────────────────────
  # FastAPI service wrapping Milvus for vector search/indexing.
  # Communicates via internal HTTP webhooks (not exposed externally).
  retrieval:
    build:
      context: ./services/retrieval
      dockerfile: Dockerfile
    container_name: agent-retrieval
    environment:
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      RABBITMQ_URL: amqp://agent:localdev@rabbitmq:5672/
      DATABASE_URL: postgresql://agent:localdev@postgres:5432/agent
    depends_on:
      milvus:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────
  # Exposes MinIO storage via /storage/ path for artifact access.
  # Clients use MINIO_PUBLIC_URL (e.g. http://localhost:8081/storage) to
  # download artifacts without knowing MinIO's internal address.
  nginx:
    image: nginx:1.27-alpine
    container_name: agent-nginx
    ports:
      - "${NGINX_PORT:-8081}:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
  rabbitmq_data:
