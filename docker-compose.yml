services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pageindex_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: pageindex_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pageindex_nginx
    depends_on:
      - minio
    ports:
      - "${MINIO_PORT}:9000"
    volumes:
      - ./nginx/minio.conf:/etc/nginx/conf.d/minio.conf:ro
    restart: unless-stopped

  minio_init:
    image: minio/mc:latest
    container_name: pageindex_minio_init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      mc mb --ignore-existing local/milvus;
      mc anonymous set download local/$${MINIO_BUCKET};
      exit 0;
      "

  # ── Milvus dependencies ──────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.14
    container_name: pageindex_etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    restart: unless-stopped

  # ── Milvus standalone ────────────────────────────────────────
  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: pageindex_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: milvus
      MINIO_USE_SSL: "false"
    ports:
      - "${MILVUS_PORT}:19530"   # gRPC  — default external 19535
      - "9091:9091"              # HTTP  / metrics
    depends_on:
      - etcd
      - minio
      - minio_init
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  postgres_data:
  minio_data:
  etcd_data:
  milvus_data:
