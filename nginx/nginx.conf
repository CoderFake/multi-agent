upstream minio_s3 {
    server minio:9000;
}

upstream minio_console {
    server minio:9001;
}

server {
    listen 8081;
    server_name _;

    # ── MinIO S3 API (artifact storage) ─────────────────────────────
    # Reverse proxy: /storage/{bucket}/{key} → MinIO S3 API
    # This allows external clients to access artifacts via a stable URL
    # without exposing MinIO's internal address.
    location /storage/ {
        # Strip /storage/ prefix and proxy to MinIO S3 API
        rewrite ^/storage/(.*)$ /$1 break;

        proxy_pass http://minio_s3;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large file uploads
        client_max_body_size 100m;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ── MinIO Console (admin UI) ────────────────────────────────────
    location /minio-console/ {
        rewrite ^/minio-console/(.*)$ /$1 break;

        proxy_pass http://minio_console;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for MinIO console
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Health check ────────────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}

